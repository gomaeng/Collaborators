<style>
:root {
  --pink: #fcbccb;
  --pink-bg: #fff8fa;
  --purple: #463b64;
  --text: #333333;
  --gray-text: #777777;
}

html, body {
  margin: 0; padding: 0;
  font-family: Inter, system-ui, -apple-system, sans-serif;
  background: #ffffff; color: var(--text);
  overflow-x: hidden;
}

/* 전체 감싸는 컨테이너 */
.coop-container {
  max-width: 1180px;
  margin: 0 auto;
  padding: 40px 20px; /* 상단 여백 확보 */
  box-sizing: border-box;
}

/* 타 섹션과 완벽히 통일된 대제목 스타일 */
.section-title {
  color: var(--purple);
  font-size: 28px;
  font-weight: 700;
  margin-bottom: 25px;
  border-bottom: 2px solid var(--purple);
  padding-bottom: 10px;
  text-align: left;
}

/* 💡 반응형 그리드: 기본 PC에서는 2열, 화면이 좁아지면 자동으로 1열 정렬 */
.coop-grid {
  display: grid;
  grid-template-columns: repeat(2, 1fr);
  gap: 20px;
}

/* 개별 작가 카드 디자인 */
.artist-card {
  border: 2px solid var(--purple);
  border-radius: 20px;
  padding: 10px;
  background: var(--pink-bg);
  box-sizing: border-box;
  text-decoration: none; /* 링크 밑줄 제거 */
  color: inherit;
  transition: transform 0.2s ease, box-shadow 0.2s ease;
  display: block;
}

.artist-card:hover {
  transform: translateY(-3px);
  box-shadow: 0 6px 12px rgba(70, 59, 100, 0.1);
}

/* 안쪽 핑크색 점선 박스 */
.card-inner {
  border: 2px dashed var(--pink);
  border-radius: 14px;
  background: #ffffff;
  padding: 10px;
  display: flex;
  flex-direction: column;
  gap: 12px;
}

/* 작가님 포트폴리오 이미지 영역 */
.image-box {
  width: 100%;
  aspect-ratio: 16 / 7.5; /* 이미지 비율에 맞춤 */
  border-radius: 10px;
  overflow: hidden;
  border: 1px solid #eee;
}

.image-box img {
  width: 100%;
  height: 100%;
  object-fit: cover;
  display: block;
}

/* 하단 프로필 및 설명 구역 */
.profile-box {
  display: flex;
  align-items: center;
  gap: 8px;
  padding: 2px 4px;
}

.profile-icon {
  width: 20px;          
  height: 20px;         
  border-radius: 50%;   
  object-fit: cover;    
  border: 1px solid #ddd;
}

.artist-info {
  font-size: 14px;
  font-weight: 600;
  color: var(--purple);
}

/* 하이라이트 문자 (핑크색 이름) */
.artist-name {
  color: #d3749d;
  font-weight: 700;
}

/* 비공개 상태 안내 텍스트 스타일 */
.private-text {
  color: var(--gray-text);
  font-weight: normal;
}

/* 📱 모바일 반응형 수치 조정 (화면 폭이 768px 이하일 때) */
@media (max-width: 768px) {
  .section-title {
    font-size: 24px;
    margin-bottom: 15px;
  }
  .coop-grid {
    grid-template-columns: 1fr; /* 1열로 변경 */
    gap: 15px;
  }
  .coop-container {
    padding: 10px;
  }
  .artist-info {
    font-size: 13px;
  }
}

<script>
(function() {
  function sendHeight() {
    const height = document.body.scrollHeight;
    parent.postMessage({ type: "coopHeight", value: height }, "*");
  }
  window.addEventListener('load', sendHeight);
  window.addEventListener('resize', sendHeight);
  setInterval(sendHeight, 1000);
})();
</script>
